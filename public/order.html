<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Investments</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0f19;
color:white;
padding-bottom:90px;
}

header{
background:#111827;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
position:sticky;
top:0;
}

header h2{
color:#ffc107;
}

.summary{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;

}

.card{

background:#161d2d;
padding:18px;
border-radius:15px;

}

.card span{

color:#999;

}

.card h2{

margin-top:8px;
color:#ffc107;

}

.section{

padding:15px;

}

.section h3{

margin-bottom:15px;
color:#ffc107;

}

.investment{

background:#161d2d;
border-radius:15px;
padding:18px;
margin-bottom:15px;

}

.title{

display:flex;
justify-content:space-between;
align-items:center;

}

.status{

background:#00b894;
padding:5px 10px;
border-radius:20px;
font-size:12px;

}

.details{

margin-top:15px;

}

.details p{

margin:8px 0;
color:#bbb;

}

.progress{

height:8px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:10px;

}

.progress div{

height:100%;
width:70%;
background:#ffc107;

}

button{

margin-top:15px;
background:#ffc107;
border:none;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;

}

.history{

background:#161d2d;
padding:15px;
border-radius:15px;
margin-bottom:12px;

}

.history p{

margin:5px 0;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;

}

.bottom-nav a{

color:#aaa;
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;

}

.bottom-nav a.active{

color:#ffc107;

}

</style>

</head>

<body>

<header>

<h2>My Investments</h2>

<i class="fa-solid fa-bell fa-lg"></i>

</header>

<div class="summary">

<div class="card">

<span>Active Investments</span>

<h2 id="activeCount">0</h2>

</div>

<div class="card">

<span>Total Profit</span>

<h2 id="profit">UGX 0</h2>

</div>

</div>

<div class="section">

<h3>Active Investments</h3>

<div id="investmentList">

<!-- Loaded from API -->

</div>

</div>

<div class="section">

<h3>Investment History</h3>

<div id="historyList">

</div>

</div>

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="order.html" class="active">

<i class="fa-solid fa-chart-line"></i>

Orders

</a>

<a href="team.html">

<i class="fa-solid fa-users"></i>

Team

</a>

<a href="me.html">

<i class="fa-solid fa-user"></i>

Me

</a>

</nav>

<script>

async function loadOrders(){

try{

const response=await fetch("/api/orders");

const data=await response.json();

document.getElementById("activeCount").innerText=data.activeCount;

document.getElementById("profit").innerText=
"UGX "+Number(data.totalProfit).toLocaleString();

let investments="";

data.active.forEach(item=>{

investments+=`

<div class="investment">

<div class="title">

<h3>${item.product_name}</h3>

<span class="status">${item.status}</span>

</div>

<div class="details">

<p>Investment : UGX ${Number(item.amount).toLocaleString()}</p>

<p>Daily Income : UGX ${Number(item.daily_income).toLocaleString()}</p>

<p>Days Left : ${item.days_left}</p>

<div class="progress">

<div style="width:${item.progress}%"></div>

</div>

<button>View Details</button>

</div>

</div>

`;

});

document.getElementById("investmentList").innerHTML=investments;

let history="";

data.history.forEach(item=>{

history+=`

<div class="history">

<p><b>${item.product_name}</b></p>

<p>Amount : UGX ${Number(item.amount).toLocaleString()}</p>

<p>Status : ${item.status}</p>

<p>Date : ${item.date}</p>

</div>

`;

});

document.getElementById("historyList").innerHTML=history;

}catch(err){

console.log(err);

}

}

loadOrders();

</script>

</body>
</html>
