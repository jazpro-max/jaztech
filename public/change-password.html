<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0f19;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#161d2d;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h2{
text-align:center;
margin-bottom:25px;
color:#f59e0b;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:6px;
}

.password-box{
position:relative;
}

.password-box input{
width:100%;
padding:14px;
background:#20293d;
border:none;
border-radius:10px;
color:white;
font-size:15px;
}

.password-box i{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
color:#9ca3af;
}

.strength{
margin-top:8px;
font-size:14px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
background:#f59e0b;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffb300;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
color:#10b981;
}

</style>

</head>

<body>

<div class="container">

<h2>Change Password</h2>

<form id="passwordForm">

<div class="form-group">

<label>Current Password</label>

<div class="password-box">

<input
type="password"
id="currentPassword"
required>

<i class="fa-solid fa-eye toggle"></i>

</div>

</div>

<div class="form-group">

<label>New Password</label>

<div class="password-box">

<input
type="password"
id="newPassword"
required>

<i class="fa-solid fa-eye toggle"></i>

</div>

<div
class="strength"
id="strength">

Password Strength

</div>

</div>

<div class="form-group">

<label>Confirm New Password</label>

<div class="password-box">

<input
type="password"
id="confirmPassword"
required>

<i class="fa-solid fa-eye toggle"></i>

</div>

</div>

<button type="submit">

Update Password

</button>

<div
class="message"
id="message">

</div>

</form>

</div>
<script>

// Show/Hide Password

document.querySelectorAll(".toggle").forEach((icon)=>{

icon.addEventListener("click",()=>{

const input=icon.previousElementSibling;

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");

}else{

input.type="password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

});

});

// Password Strength

const newPassword=document.getElementById("newPassword");

const strength=document.getElementById("strength");

newPassword.addEventListener("input",()=>{

const value=newPassword.value;

if(value.length<8){

strength.innerHTML="Weak Password";

strength.style.color="#ef4444";

}else if(

/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(value)

){

strength.innerHTML="Medium Password";

strength.style.color="#f59e0b";

}

if(

/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?#&]).{8,}$/.test(value)

){

strength.innerHTML="Strong Password";

strength.style.color="#10b981";

}

});

// Change Password

document.getElementById("passwordForm")

.addEventListener("submit",async(e)=>{

e.preventDefault();

const currentPassword=

document.getElementById("currentPassword").value;

const password=

document.getElementById("newPassword").value;

const confirmPassword=

document.getElementById("confirmPassword").value;

if(password!==confirmPassword){

alert("Passwords do not match.");

return;

}

if(password.length<8){

alert("Password must be at least 8 characters.");

return;

}

try{

const response=await fetch("/api/change-password",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

currentPassword,

newPassword:password

})

});

const result=await response.json();

if(response.ok){

document.getElementById("message").innerHTML=

"✅ Password changed successfully.";

document.getElementById("passwordForm").reset();

strength.innerHTML="Password Strength";

strength.style.color="white";

}else{

alert(result.message || "Unable to change password.");

}

}catch(error){

console.error(error);

alert("Server connection failed.");

}

});

</script>

</body>

</html>
