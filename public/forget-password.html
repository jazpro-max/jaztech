<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;

}

body{

background:#0b0f19;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}

.box{

width:100%;
max-width:420px;
background:#161d2d;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo i{

font-size:60px;
color:#f59e0b;

}

.logo h2{

color:white;
margin-top:15px;

}

.logo p{

color:#9ca3af;
margin-top:8px;

}

.step{

display:none;

}

.step.active{

display:block;

}

label{

display:block;
color:#d1d5db;
margin-bottom:7px;

}

input{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#20293d;
color:white;
font-size:15px;
margin-bottom:18px;

}

.password{

position:relative;

}

.password i{

position:absolute;
right:15px;
top:14px;
color:#9ca3af;
cursor:pointer;

}

button{

width:100%;
padding:15px;
background:#f59e0b;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#ffb300;

}

.back{

text-align:center;
margin-top:20px;

}

.back a{

color:#f59e0b;
text-decoration:none;

}

.message{

text-align:center;
margin-top:15px;
color:#10b981;

}

</style>

</head>


<body>


<div class="box">


<div class="logo">

<i class="fa-solid fa-lock"></i>

<h2>Password Reset</h2>

<p>Recover your account securely</p>

</div>


<!-- STEP 1 -->

<div class="step active" id="step1">


<label>Email or Phone</label>

<input
type="text"
id="account"
placeholder="Enter email or phone">


<button onclick="sendCode()">

Send Reset Code

</button>


</div>


<!-- STEP 2 -->

<div class="step" id="step2">


<label>Verification Code</label>

<input
type="number"
id="code"
placeholder="Enter OTP code">


<button onclick="verifyCode()">

Verify Code

</button>


</div>


<!-- STEP 3 -->

<div class="step" id="step3">


<label>New Password</label>


<div class="password">

<input
type="password"
id="newPassword"
placeholder="Create new password">


<i class="fa-solid fa-eye"
id="eye"></i>


</div>


<label>Confirm Password</label>


<input
type="password"
id="confirmNewPassword"
placeholder="Confirm password">


<button onclick="resetPassword()">

Reset Password

</button>


</div>


<div class="message" id="message"></div>


<div class="back">

<a href="login.html">

Back to Login

</a>

</div>


</div>
<script>

const eye=document.getElementById("eye");

const password=document.getElementById("newPassword");

eye.addEventListener("click",()=>{

if(password.type==="password"){

password.type="text";

eye.classList.remove("fa-eye");

eye.classList.add("fa-eye-slash");

}else{

password.type="password";

eye.classList.remove("fa-eye-slash");

eye.classList.add("fa-eye");

}

});

function showStep(step){

document.querySelectorAll(".step").forEach(s=>{

s.classList.remove("active");

});

document.getElementById(step).classList.add("active");

}

async function sendCode(){

const account=

document.getElementById("account").value.trim();

if(account===""){

alert("Enter your email or phone number.");

return;

}

try{

const response=await fetch("/api/forgot-password",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({account})

});

const result=await response.json();

if(response.ok){

document.getElementById("message").innerText=

"A verification code has been sent.";

showStep("step2");

}else{

alert(result.message||"Unable to send code.");

}

}catch(error){

console.error(error);

alert("Server connection failed.");

}

}

async function verifyCode(){

const code=

document.getElementById("code").value.trim();

if(code===""){

alert("Enter the verification code.");

return;

}

try{

const response=await fetch("/api/verify-reset-code",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({code})

});

const result=await response.json();

if(response.ok){

document.getElementById("message").innerText=

"Code verified successfully.";

showStep("step3");

}else{

alert(result.message||"Invalid verification code.");

}

}catch(error){

console.error(error);

alert("Server connection failed.");

}

}

async function resetPassword(){

const newPassword=

document.getElementById("newPassword").value;

const confirmPassword=

document.getElementById("confirmNewPassword").value;

if(newPassword.length<8){

alert("Password must be at least 8 characters.");

return;

}

if(newPassword!==confirmPassword){

alert("Passwords do not match.");

return;

}

try{

const response=await fetch("/api/reset-password",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

password:newPassword

})

});

const result=await response.json();

if(response.ok){

alert("Password reset successfully.");

window.location.href="login.html";

}else{

alert(result.message||"Password reset failed.");

}

}catch(error){

console.error(error);

alert("Unable to connect to the server.");

}

}

</script>

</body>

</html>
