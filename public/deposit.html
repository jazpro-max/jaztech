<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Deposit Funds</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0f19;
color:#fff;
padding-bottom:90px;
}

header{
background:#111827;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
z-index:100;
}

header h2{
color:#f59e0b;
font-size:22px;
}

.container{
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:#161d2d;
border-radius:18px;
padding:20px;
margin-bottom:18px;
box-shadow:0 4px 15px rgba(0,0,0,.3);
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
color:#f59e0b;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
color:#d1d5db;
}

input,
select{

width:100%;
padding:13px;
border-radius:10px;
border:1px solid #2d3748;
background:#20293d;
color:#fff;
font-size:15px;

}

input:focus,
select:focus{

outline:none;
border-color:#f59e0b;

}

.info{

background:#20293d;
padding:15px;
border-radius:10px;
line-height:1.8;

}

.info span{

color:#f59e0b;
font-weight:bold;

}

.upload{

margin-top:15px;

}

button{

width:100%;
margin-top:20px;
padding:14px;
background:#f59e0b;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#ffb300;

}

.history{

background:#20293d;
padding:15px;
border-radius:12px;
margin-top:12px;

}

.status{

display:inline-block;
padding:4px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;

}

.pending{

background:#f59e0b;
color:#000;

}

.approved{

background:#10b981;

}

.rejected{

background:#ef4444;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;

}

.bottom-nav a{

text-decoration:none;
color:#9ca3af;
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;

}

.bottom-nav a.active{

color:#f59e0b;

}

</style>

</head>

<body>

<header>

<h2>Deposit Funds</h2>

<i class="fa-solid fa-wallet fa-lg"></i>

</header>

<div class="container">
<!-- Payment Information -->

<div class="card">

<div class="card-title">
Payment Details
</div>

<div class="info">

<p><strong>Payment Method:</strong> Mobile Money</p>

<p>MTN MoMo Number</p>

<p><span id="mtnNumber">0772123456</span></p>

<br>

<p>Airtel Money Number</p>

<p><span id="airtelNumber">0700123456</span></p>

<br>

<p>Account Name</p>

<p><span id="accountName">JAZTECH SHOPPING LTD</span></p>

</div>

</div>

<!-- Deposit Form -->

<div class="card">

<div class="card-title">
Submit Deposit
</div>

<form id="depositForm">

<label>Amount (UGX)</label>

<input
type="number"
id="amount"
placeholder="Enter amount"
required>

<label>Payment Network</label>

<select id="network">

<option value="MTN">MTN Mobile Money</option>

<option value="Airtel">Airtel Money</option>

</select>

<label>Transaction ID</label>

<input
type="text"
id="transactionId"
placeholder="Example: PP240715ABC123"
required>

<label>Payment Screenshot (Optional)</label>

<input
type="file"
id="receipt"
accept="image/*">

<button type="submit">

<i class="fa-solid fa-paper-plane"></i>

Submit Deposit

</button>

</form>

</div>

<!-- Deposit History -->

<div class="card">

<div class="card-title">
Recent Deposits
</div>

<div id="depositHistory">

<div class="history">

<p>No deposits found.</p>

</div>

</div>

</div>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="order.html">

<i class="fa-solid fa-chart-line"></i>

<span>Orders</span>

</a>

<a href="team.html">

<i class="fa-solid fa-users"></i>

<span>Team</span>

</a>

<a href="me.html" class="active">

<i class="fa-solid fa-user"></i>

<span>Me</span>

</a>

</nav>
<script>

async function loadDepositHistory(){

try{

const response = await fetch("/api/deposits/history");

const deposits = await response.json();

const history = document.getElementById("depositHistory");

if(!Array.isArray(deposits) || deposits.length===0){

history.innerHTML=`
<div class="history">
<p>No deposit history found.</p>
</div>
`;

return;

}

history.innerHTML="";

deposits.forEach(item=>{

let statusClass="pending";

if(item.status==="Approved") statusClass="approved";

if(item.status==="Rejected") statusClass="rejected";

history.innerHTML+=`

<div class="history">

<h4>UGX ${Number(item.amount).toLocaleString()}</h4>

<p>Network: ${item.network}</p>

<p>Transaction ID: ${item.transaction_id}</p>

<p>Date: ${new Date(item.created_at).toLocaleString()}</p>

<br>

<span class="status ${statusClass}">
${item.status}
</span>

</div>

`;

});

}catch(error){

console.error(error);

}

}

document
.getElementById("depositForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const formData=new FormData();

formData.append(
"amount",
document.getElementById("amount").value
);

formData.append(
"network",
document.getElementById("network").value
);

formData.append(
"transactionId",
document.getElementById("transactionId").value
);

const file=document.getElementById("receipt").files[0];

if(file){

formData.append("receipt",file);

}

try{

const response=await fetch("/api/deposit",{

method:"POST",

body:formData

});

const result=await response.json();

if(response.ok){

alert(result.message || "Deposit submitted successfully.");

document.getElementById("depositForm").reset();

loadDepositHistory();

}else{

alert(result.message || "Deposit submission failed.");

}

}catch(error){

console.error(error);

alert("Unable to connect to server.");

}

});

loadDepositHistory();

</script>

</body>
</html>
