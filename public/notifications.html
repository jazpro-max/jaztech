<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0f19;
color:white;
padding-bottom:90px;
}

header{
background:#111827;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
border-bottom:1px solid #1f2937;
z-index:100;
}

header h2{
color:#f59e0b;
}

.container{
max-width:800px;
margin:auto;
padding:16px;
}

.actions{
display:flex;
justify-content:space-between;
margin-bottom:18px;
}

button{
background:#f59e0b;
color:#000;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.notification{

background:#161d2d;
padding:18px;
border-radius:15px;
margin-bottom:15px;
display:flex;
gap:15px;
align-items:flex-start;

}

.icon{

width:45px;
height:45px;
border-radius:50%;
background:#20293d;
display:flex;
align-items:center;
justify-content:center;
color:#f59e0b;
font-size:20px;

}

.content{

flex:1;

}

.content h3{

margin-bottom:6px;

}

.content p{

color:#9ca3af;
font-size:14px;
line-height:1.5;

}

.time{

margin-top:8px;
font-size:12px;
color:#6b7280;

}

.unread{

border-left:4px solid #f59e0b;

}

.read{

opacity:.75;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;

}

.bottom-nav a{

display:flex;
flex-direction:column;
align-items:center;
text-decoration:none;
color:#9ca3af;
font-size:13px;

}

.bottom-nav a.active{

color:#f59e0b;

}

</style>

</head>

<body>

<header>

<h2>Notifications</h2>

<i class="fa-solid fa-bell fa-lg"></i>

</header>

<div class="container">

<div class="actions">

<button onclick="markAllRead()">

Mark All Read

</button>

<button onclick="deleteAll()">

Delete All

</button>

</div>

<div id="notificationList">

</div>

</div>
<!-- Bottom Navigation -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="order.html">

<i class="fa-solid fa-chart-line"></i>

<span>Orders</span>

</a>

<a href="team.html">

<i class="fa-solid fa-users"></i>

<span>Team</span>

</a>

<a href="me.html" class="active">

<i class="fa-solid fa-user"></i>

<span>Me</span>

</a>

</nav>

<script>

let notifications=[];

async function loadNotifications(){

try{

const response=await fetch("/api/notifications");

notifications=await response.json();

renderNotifications();

}catch(error){

console.error(error);

}

}

function renderNotifications(){

const list=document.getElementById("notificationList");

list.innerHTML="";

if(notifications.length===0){

list.innerHTML=`

<div class="notification">

<div class="content">

<h3>No Notifications</h3>

<p>You have no notifications.</p>

</div>

</div>

`;

return;

}

notifications.forEach(item=>{

list.innerHTML+=`

<div class="notification ${item.read?'read':'unread'}">

<div class="icon">

<i class="${item.icon || 'fa-solid fa-bell'}"></i>

</div>

<div class="content">

<h3>${item.title}</h3>

<p>${item.message}</p>

<div class="time">

${item.time}

</div>

<br>

<button onclick="markRead(${item.id})">

Mark Read

</button>

<button
style="background:#ef4444;margin-left:8px;color:white;"
onclick="deleteNotification(${item.id})">

Delete

</button>

</div>

</div>

`;

});

}

async function markRead(id){

try{

await fetch(`/api/notifications/read/${id}`,{

method:"PUT"

});

loadNotifications();

}catch(error){

console.error(error);

}

}

async function deleteNotification(id){

if(!confirm("Delete this notification?"))

return;

try{

await fetch(`/api/notifications/${id}`,{

method:"DELETE"

});

loadNotifications();

}catch(error){

console.error(error);

}

}

async function markAllRead(){

try{

await fetch("/api/notifications/read-all",{

method:"PUT"

});

loadNotifications();

}catch(error){

console.error(error);

}

}

async function deleteAll(){

if(!confirm("Delete all notifications?"))

return;

try{

await fetch("/api/notifications",{

method:"DELETE"

});

loadNotifications();

}catch(error){

console.error(error);

}

}

loadNotifications();

</script>

</body>

</html>
