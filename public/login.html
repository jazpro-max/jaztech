<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Orb - Authentication</title>
    <style>
        body {
            background-color: #060b13;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: #111823;
            border: 1px solid #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .brand {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ffd700, #f3a63b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #8fa0ba; margin-bottom: 5px; }
        input {
            width: 100%;
            background: #060b13;
            border: 1px solid #1e293b;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #f3a63b);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
        }
        .toggle-link {
            text-align: center;
            font-size: 0.85rem;
            color: #8fa0ba;
            margin-top: 15px;
            cursor: pointer;
        }
        .toggle-link span { color: #f3a63b; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand">GOLD ORB PLATFORM</div>
    
    <h3 id="form-title" style="margin-top:0;">Account Login</h3>
    <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="form-group">
            <label>Mobile Phone Number</label>
            <input type="number" id="phone" required placeholder="e.g. 0700000000">
        </div>
        <div class="form-group">
            <label>Security Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div class="form-group" id="invite-group" style="display: none;">
            <label>Invitation Code (Optional)</label>
            <input type="text" id="invite-code" placeholder="6391524">
        </div>
        <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <div class="toggle-link" id="toggle-view-btn" onclick="toggleAuthMode()">
        Don't have an account? <span>Register Here</span>
    </div>
</div>

<script>
    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? 'Account Login' : 'Create Account';
        document.getElementById('submit-btn').innerText = isLoginMode ? 'Sign In' : 'Sign Up';
        document.getElementById('invite-group').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('toggle-view-btn').innerHTML = isLoginMode ? 
            "Don't have an account? <span>Register Here</span>" : "Already registered? <span>Log In Instead</span>";
    }

    async function handleAuth(e) {
        e.preventDefault();
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const inviteCode = document.getElementById('invite-code').value;

        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
        const payload = isLoginMode ? { phone, password } : { phone, password, inviteCode };

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if (data.success) {
                alert(isLoginMode ? "Login successful!" : "Registration successful! Proceeding to account...");
                window.location.href = '/dashboard.html';
            } else {
                alert(data.message || "Authentication transaction failed.");
            }
        } catch (err) {
            alert("Connection error occurred. Check backend hosting statuses.");
        }
    }
</script>
</body>
</html>
